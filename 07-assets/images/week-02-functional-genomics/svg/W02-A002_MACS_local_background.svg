<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="MACS-style peak calling: enrichment over local background">

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
  </marker>
</defs>


<style>
  svg { font-family: Arial, Helvetica, sans-serif; background: #ffffff; }
  .title { font-size: 26px; font-weight: 700; fill: #14213d; }
  .subtitle { font-size: 15px; fill: #334155; }
  .label { font-size: 16px; font-weight: 700; fill: #0f172a; }
  .small { font-size: 13px; fill: #334155; }
  .tiny { font-size: 11px; fill: #475569; }
  .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 14; }
  .input { fill: #e0f2fe; stroke: #0284c7; }
  .process { fill: #ecfdf5; stroke: #059669; }
  .warn { fill: #fff7ed; stroke: #ea580c; }
  .risk { fill: #fef2f2; stroke: #dc2626; }
  .purple { fill: #f3e8ff; stroke: #7e22ce; }
  .gray { fill: #f1f5f9; stroke: #64748b; }
  .dna { stroke: #334155; stroke-width: 3; fill: none; }
  .read { stroke: #2563eb; stroke-width: 5; stroke-linecap: round; }
  .peak { fill: #60a5fa; opacity: 0.75; }
  .accent { stroke: #f97316; stroke-width: 3; fill: none; }
  .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 6 5; }
</style>

<text x="48" y="54" class="title">MACS-style peak calling: enrichment over local background</text>
<text x="48" y="82" class="subtitle">A narrow peak is a statistical claim against a structured background, not just a tall pileup.</text>
<rect x="70" y="125" width="1140" height="470" class="box input" /><text x="95" y="165" class="label">Observed ChIP-seq pileup</text><line x1="120" y1="470" x2="1130" y2="470" stroke="#334155" stroke-width="3"/><rect x="180" y="420" width="60" height="50" class="peak"/><rect x="260" y="400" width="55" height="70" class="peak"/><rect x="345" y="380" width="50" height="90" class="peak"/><rect x="520" y="250" width="45" height="220" class="peak"/><rect x="570" y="210" width="45" height="260" class="peak"/><rect x="620" y="260" width="45" height="210" class="peak"/><rect x="820" y="405" width="65" height="65" class="peak"/><rect x="910" y="425" width="55" height="45" class="peak"/><path d="M480,470 C510,280 640,260 690,470" fill="#2563eb" opacity="0.30" stroke="#2563eb" stroke-width="2"/><line x1="500" y1="520" x2="700" y2="520" stroke="#f97316" stroke-width="4"/><text x="535" y="550" class="small">candidate enriched region</text><line x1="130" y1="595" x2="1150" y2="595" stroke="#64748b" stroke-width="2" stroke-dasharray="8 7"/><text x="135" y="625" class="label">Local background model: estimate expected read density around the candidate peak, not from a flat genome-wide constant.</text><path d="M600,400 L600,330" class="arrow" /><text x="630" y="340" class="small">Summit / peak evidence</text><path d="M320,405 L450,520" class="arrow" /><text x="155" y="365" class="small">Regional background</text><text x="95" y="210" class="small">MACS teaching idea: model enrichment over a dynamic local background, after estimating fragment shift from strand geometry.</text>
</svg>