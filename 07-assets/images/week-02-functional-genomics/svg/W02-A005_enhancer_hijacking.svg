<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Enhancer hijacking: structural variation rewires regulatory context">

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
  </marker>
</defs>


<style>
  svg { font-family: Arial, Helvetica, sans-serif; background: #ffffff; }
  .title { font-size: 26px; font-weight: 700; fill: #14213d; }
  .subtitle { font-size: 15px; fill: #334155; }
  .label { font-size: 16px; font-weight: 700; fill: #0f172a; }
  .small { font-size: 13px; fill: #334155; }
  .tiny { font-size: 11px; fill: #475569; }
  .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 14; }
  .input { fill: #e0f2fe; stroke: #0284c7; }
  .process { fill: #ecfdf5; stroke: #059669; }
  .warn { fill: #fff7ed; stroke: #ea580c; }
  .risk { fill: #fef2f2; stroke: #dc2626; }
  .purple { fill: #f3e8ff; stroke: #7e22ce; }
  .gray { fill: #f1f5f9; stroke: #64748b; }
  .dna { stroke: #334155; stroke-width: 3; fill: none; }
  .read { stroke: #2563eb; stroke-width: 5; stroke-linecap: round; }
  .peak { fill: #60a5fa; opacity: 0.75; }
  .accent { stroke: #f97316; stroke-width: 3; fill: none; }
  .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 6 5; }
</style>

<text x="48" y="54" class="title">Enhancer hijacking: structural variation rewires regulatory context</text>
<text x="48" y="82" class="subtitle">A rearrangement can move an oncogene into an active enhancer neighborhood.</text>
<text x="95" y="145" class="label">Normal regulatory neighborhood</text><rect x="80" y="170" width="500" height="180" class="box gray" /><path d="M120,260 C210,210 310,300 420,245 C480,215 525,235 555,255" class="dna"/><rect x="155" y="220" width="70" height="24" fill="#fbbf24" stroke="#d97706"/><text x="145" y="210" class="tiny">enhancer</text><rect x="440" y="240" width="80" height="28" fill="#93c5fd" stroke="#2563eb"/><text x="438" y="285" class="tiny">gene A</text><text x="115" y="330" class="small">Oncogene is outside this enhancer domain</text><text x="720" y="145" class="label">After structural rearrangement</text><rect x="700" y="170" width="500" height="180" class="box warn" /><path d="M740,260 C830,210 930,300 1040,245 C1100,215 1145,235 1175,255" class="dna"/><rect x="775" y="220" width="70" height="24" fill="#fbbf24" stroke="#d97706"/><text x="765" y="210" class="tiny">active enhancer</text><rect x="1020" y="240" width="105" height="28" fill="#fecaca" stroke="#dc2626"/><text x="1018" y="285" class="tiny">oncogene</text><path d="M820,230 C880,165 1010,165 1065,240" stroke="#ef4444" stroke-width="3" fill="none" marker-end="url(#arrow)"/><text x="735" y="330" class="small">Enhancer now activates a cancer gene</text><path d="M585,260 L695,260" class="arrow" /><text x="595" y="235" class="small">SV / rearrangement</text><rect x="160" y="440" width="960" height="110" class="box purple" /><text x="190" y="482" class="label">Teaching point</text><text x="190" y="515" class="small">Enhancer hijacking links structural variation, chromatin state, and oncogene activation — but the figure should stay mechanism-focused.</text><text x="190" y="545" class="tiny">Examples for placeholders: medulloblastoma GFI1/GFI1B and BCL11B lineage-ambiguous leukemia.</text>
</svg>