  <script>window.LECTURE_DECK = {"module": "Week 02 — Functional Genomics in Cancer", "lecture": "Lecture 1 — Background & Problem Definition", "sourceSlideText": "04-slides/week-02-functional-genomics/slide-text.md", "sourceScript": "05-scripts/week-02-functional-genomics/lecture-01-script.md", "audioManifest": "06-audio/week-02-functional-genomics/audio-manifest.md", "slides": [{"id": "L1-01", "title": "Functional Genomics in Cancer", "steps": [{"type": "bullet", "text": "Week 02: bulk regulatory assays as computational measurement systems"}, {"type": "bullet", "text": "From biased molecular readouts to defensible regulatory claims"}, {"type": "bullet", "text": "Core question: what can we infer from peaks, fragments, domains, and contacts?"}], "visual": {"type": "placeholder", "description": "Title slide with simple icons for sequencing reads, chromatin, enhancer, and contact map."}, "audio": "assets/audio/week02_lecture01_L1-01.mp3", "transcript": "Today we start the functional genomics module. The theme is simple but important: these assays do not directly tell us “this is an enhancer,” “this transcription factor is active,” or “this loop is causal.” They give us molecular readouts — reads, fragments, domains, or contact counts — and we have to turn those readouts into regulatory claims.\n\nSo this is not mainly a tour of software names. We will talk about tools, but the deeper goal is to understand what problem each tool is trying to solve. A peak caller, a domain caller, a footprinting method, and a loop caller all encode assumptions about the assay and about the background signal.\n\nBy the end of the week, I want you to be able to look at a regulatory genomics result in a cancer paper and ask: what exactly was measured, what model converted that measurement into a call, and how strong is the evidence for the biological interpretation?", "sources": ["Module synthesis; no single source required."]}, {"id": "L1-02", "title": "Why mutations are not enough", "steps": [{"type": "bullet", "text": "Many cancer mechanisms are regulatory, not coding-only"}, {"type": "bullet", "text": "Lineage state, enhancer activation, TF rewiring, and 3D regulatory context can shape tumor behavior"}, {"type": "bullet", "text": "Functional genomics helps explain *when* and *where* the genome is active"}], "visual": {"type": "placeholder", "description": "Regulatory mechanism map: mutation list → regulatory state → phenotype."}, "audio": "assets/audio/week02_lecture01_L1-02.mp3", "transcript": "Cancer genomics often starts with mutations: point mutations, copy number changes, structural variants. Those are essential, but they do not explain everything. Two tumors can have similar coding alterations and very different cell states. A tumor can change lineage program, immune visibility, enhancer activity, or transcription factor dependence without a simple new coding mutation.\n\nThat is where functional genomics enters. These assays ask when and where the genome is active. Which promoters are open? Which enhancers are active? Which transcription factors are bound? Which regulatory regions physically contact candidate target genes?\n\nIn cancer, this matters for several recurring mechanisms. In pan-cancer ATAC-seq, accessibility maps reveal regulatory programs and subtype structure. In prostate cancer, the androgen receptor can be redistributed across a new cistrome during tumorigenesis. In neuroblastoma, super-enhancer landscapes help define regulatory cell states. In enhancer hijacking, the coding sequence of an oncogene may be unchanged, but a structural rearrangement moves it into a new regulatory neighborhood.\n\nSo the mutation list is not the whole mechanism. Functional genomics gives us evidence about regulatory state.", "sources": ["S011", "S012", "S016-S019"]}, {"id": "L1-03", "title": "Three questions before software", "steps": [{"type": "bullet", "text": "What is the observed statistical object?"}, {"type": "bullet", "text": "What is signal versus background?"}, {"type": "bullet", "text": "How do we know the call is reproducible and biologically interpretable?"}], "visual": {"type": "placeholder", "description": "Three-question triangle: assay → model → evidence."}, "audio": "assets/audio/week02_lecture01_L1-03.mp3", "transcript": "Before choosing a tool, I want you to ask three questions.\n\nFirst: what is the observed statistical object? Is it a pileup of ChIP-seq reads? Paired-end ATAC fragments? A sparse contact matrix? These are not interchangeable.\n\nSecond: what is signal versus background? A peak only means something relative to an expected background. That background may depend on mappability, GC content, chromatin accessibility, local copy number, enzyme bias, or genomic distance.\n\nThird: how do we know the call is reproducible and biologically interpretable? A tall pileup in one sample is not enough. We need quality control, replicate consistency, calibration, and ideally some orthogonal evidence.\n\nIf you keep these three questions in mind, the rest of the week becomes much easier. Different tools are different answers to these questions.", "sources": ["S001", "S007", "S013-S015"], "ordered": true}, {"id": "L1-04", "title": "Assay families produce different objects", "steps": [{"type": "bullet", "text": "ChIP-seq: target-enriched fragments"}, {"type": "bullet", "text": "ATAC-seq: accessible fragments with nucleosome-scale structure"}, {"type": "bullet", "text": "CUT&RUN/CUT&Tag: tethered low-background signal"}, {"type": "bullet", "text": "Hi-C/HiChIP-like assays: sparse chromatin contact counts"}], "visual": {"type": "placeholder", "description": "W02-A001 / prompt-based visual draft: assay comparison."}, "audio": "assets/audio/week02_lecture01_L1-04.mp3", "transcript": "Here are four major families we will use throughout the module.\n\nChIP-seq enriches DNA fragments associated with a target protein or histone mark. The output is usually a genomic enrichment track, and we often summarize it as peaks or domains.\n\nATAC-seq uses Tn5 transposase to insert into accessible chromatin. The output is a collection of paired-end fragments. Those fragments tell us about accessibility, but their lengths also carry information about nucleosome structure.\n\nCUT&RUN and CUT&Tag use tethered enzymes to cut or tag DNA near a target. These assays often have lower background and different signal geometry from classical ChIP-seq.\n\nFinally, Hi-C, HiChIP, PLAC-seq, and related assays measure pairs of genomic loci that are close in 3D space. Their output is a contact map or a list of contact counts, not a simple one-dimensional peak track.\n\nThe key point is that assay chemistry defines the statistical object. You cannot responsibly analyze all of these as if they were the same kind of signal.", "sources": ["S001", "S004", "S006", "S010"]}, {"id": "L1-05", "title": "ChIP-seq and CUT assays are enrichment experiments", "steps": [{"type": "bullet", "text": "ChIP-seq enriches DNA fragments associated with a target protein or mark"}, {"type": "bullet", "text": "CUT assays localize cleavage or tagmentation near the target"}, {"type": "bullet", "text": "Both produce genomic signal tracks that must be compared against expected background"}], "visual": {"type": "placeholder", "description": "Enrichment track with target-bound loci and background reads."}, "audio": "assets/audio/week02_lecture01_L1-05.mp3", "transcript": "ChIP-seq and CUT assays both produce enrichment signals along the genome, but they get there differently.\n\nIn ChIP-seq, we fragment chromatin, use an antibody to enrich DNA associated with a protein or histone mark, and then sequence the enriched fragments. In CUT&RUN or CUT&Tag, an enzyme is targeted near a protein of interest and cuts or tags nearby DNA.\n\nIn both cases, the visual output can look deceptively simple: a genome browser track with hills and valleys. But those hills are not self-interpreting. A tall region may reflect true binding, broad chromatin state, local background, antibody behavior, mappability artifacts, or other biases.\n\nThat is why peak calling is a statistical problem. We are not just looking for tall piles of reads; we are asking which regions are enriched beyond what we expect under an appropriate background model.", "sources": ["S001", "S006", "S007"]}, {"id": "L1-06", "title": "ATAC-seq measures accessibility and structure", "steps": [{"type": "bullet", "text": "Tn5 inserts preferentially into accessible chromatin"}, {"type": "bullet", "text": "Paired-end fragment lengths encode nucleosome-free and nucleosome-associated DNA"}, {"type": "bullet", "text": "Accessibility is a measurement, not automatically a regulatory function"}], "visual": {"type": "placeholder", "description": "Fragment-size ladder: short, mono-nucleosome, di-nucleosome fragments."}, "audio": "assets/audio/week02_lecture01_L1-06.mp3", "transcript": "ATAC-seq is often described as measuring open chromatin, and that is a useful shorthand. But computationally, ATAC-seq gives us more than a one-dimensional accessibility track.\n\nTn5 inserts into accessible DNA. With paired-end sequencing, we observe fragments of different lengths. Very short fragments tend to represent nucleosome-free DNA. Longer fragments can represent mono-nucleosome or di-nucleosome protected DNA.\n\nThat means the fragment length distribution itself carries biological structure. Later, when we discuss HMMRATAC, we will see a method that explicitly uses these fragment classes to model chromatin states.\n\nBut we should also be careful. Accessibility is a measurement. It does not automatically mean a region is an active enhancer, and it does not automatically tell us which transcription factor is bound.", "sources": ["S004", "S005"]}, {"id": "L1-07", "title": "Contact assays are sparse and distance-biased", "steps": [{"type": "bullet", "text": "Contact assays observe pairs of genomic loci, not direct regulatory causality"}, {"type": "bullet", "text": "Nearby loci contact more often by default"}, {"type": "bullet", "text": "Distance-aware null models are essential for loop interpretation"}], "visual": {"type": "placeholder", "description": "Contact matrix plus genomic-distance decay curve."}, "audio": "assets/audio/week02_lecture01_L1-07.mp3", "transcript": "Contact assays measure pairs of genomic loci. In Hi-C, HiChIP, PLAC-seq, and related methods, the basic observation is that two loci were close enough in the nucleus to be ligated and sequenced as a pair.\n\nThis is powerful, because enhancer activity often depends on long-range regulatory relationships. But contact data are strongly biased by genomic distance. Loci that are close along the linear genome contact each other more often by default. So a contact count is not meaningful without an expectation model.\n\nThis is why methods like FitHiC2 and MAPS focus on distance-aware significance. The question is not simply whether two loci contact. The question is whether they contact more often than expected, given distance, capture design, and assay context.\n\nAnd even then, a contact is not proof of regulation. It is physical proximity evidence.", "sources": ["S010", "S012"]}, {"id": "L1-08", "title": "Background is structured", "steps": [{"type": "bullet", "text": "Genomic background varies by mappability, GC content, chromatin state, and local copy/context"}, {"type": "bullet", "text": "Some regions repeatedly show anomalous signal across assays"}, {"type": "bullet", "text": "Filtering and background modeling are part of the biological claim"}], "visual": {"type": "placeholder", "description": "Structured background cartoon with blacklist-like artifact region."}, "audio": "assets/audio/week02_lecture01_L1-08.mp3", "transcript": "One of the most important ideas in this module is that background varies across the genome.\n\nSome regions are easier to map. Some regions have unusual GC content. Some regions are open or repetitive in ways that create signal in many assays. Some regions repeatedly show anomalous enrichment and are captured in resources like the ENCODE blacklist.\n\nSo if we say “this is a peak,” we should ask: a peak relative to what? Relative to a genome-wide constant? Relative to nearby local background? Relative to an input control? Relative to a replicate? Relative to a distance-matched contact expectation?\n\nMACS is a classic example because it made local background modeling central to ChIP-seq peak calling. The deeper lesson is not just MACS itself; the lesson is that background estimation is part of the biological claim.", "sources": ["S001", "S014"]}, {"id": "L1-09", "title": "Controls are models, not magic", "steps": [{"type": "bullet", "text": "Input/control tracks estimate expected non-target signal"}, {"type": "bullet", "text": "Controls reduce artifacts but introduce their own assumptions"}, {"type": "bullet", "text": "Assay-specific controls differ across ChIP-seq, CUT assays, ATAC-seq, and contact assays"}], "visual": {"type": "placeholder", "description": "Signal track over control/background track."}, "audio": "assets/audio/week02_lecture01_L1-09.mp3", "transcript": "It is tempting to think that a control track solves the background problem. It helps, but it does not eliminate modeling.\n\nAn input control in ChIP-seq estimates non-target signal from fragmentation, sequencing, copy number, and genomic biases. But it may not perfectly match the immunoprecipitated sample. CUT assays may have different background properties. ATAC-seq often does not have the same kind of input control. Contact assays require their own distance and capture-aware expectations.\n\nSo controls reduce artifacts, but they also encode assumptions. What is the control supposed to represent? What biases does it capture? What biases does it miss?\n\nWhen you read a paper, do not just ask whether there was a control. Ask whether the control matches the statistical problem.", "sources": ["S001", "S006", "S007"]}, {"id": "L1-10", "title": "Reproducibility is part of the model", "steps": [{"type": "bullet", "text": "QC: library complexity, FRiP, TSS enrichment, cross-correlation, blacklist filtering"}, {"type": "bullet", "text": "Replicate consistency asks whether ranked calls are stable"}, {"type": "bullet", "text": "A peak without reproducibility evidence is only a candidate"}], "visual": {"type": "placeholder", "description": "QC gate diagram."}, "audio": "assets/audio/week02_lecture01_L1-10.mp3", "transcript": "Quality control is often presented as a checklist, but it is more than that. It determines how much confidence we should place in the calls.\n\nFor these assays, common QC concepts include library complexity, fraction of reads in peaks, TSS enrichment for ATAC-seq, strand cross-correlation for ChIP-seq, blacklist filtering, and replicate consistency.\n\nReplicate consistency is especially important. IDR-style thinking asks whether highly ranked calls are reproducible across replicates. That is different from simply asking whether two peak lists overlap by eye.\n\nThe practical lesson is this: a peak without reproducibility evidence is still only a candidate. It may be interesting, but it is not yet a strong regulatory claim.", "sources": ["S002", "S007", "S013", "S014"]}, {"id": "L1-11", "title": "Regulatory annotation is evidence aggregation", "steps": [{"type": "bullet", "text": "Peaks, motifs, histone marks, accessibility, expression, and contacts are evidence layers"}, {"type": "bullet", "text": "Candidate regulatory elements are not automatically causal enhancers"}, {"type": "bullet", "text": "Strong claims require multiple consistent evidence types"}], "visual": {"type": "placeholder", "description": "Evidence stack: peak → mark → motif → contact → expression → perturbation."}, "audio": "assets/audio/week02_lecture01_L1-11.mp3", "transcript": "Regulatory annotation is not a single measurement. It is evidence aggregation.\n\nA region may be accessible. It may have H3K27ac. It may contain a transcription factor motif. It may contact a promoter. Its accessibility may correlate with gene expression. Each of these is an evidence layer.\n\nResources like ENCODE SCREEN and the cCRE registry formalize this idea by integrating accessibility, histone marks, CTCF, and other evidence. Cistrome resources do something related for public chromatin profiles and cancer regulatory hypotheses.\n\nBut even when multiple layers agree, we should keep language careful. “Candidate enhancer” is different from “validated enhancer.” “Contacted gene” is different from “causal target gene.” Stronger claims require stronger evidence, especially perturbation evidence.", "sources": ["S008-S010"]}, {"id": "L1-12", "title": "Lecture 1 synthesis", "steps": [{"type": "bullet", "text": "Define the assay object"}, {"type": "bullet", "text": "Model signal against structured background"}, {"type": "bullet", "text": "Require reproducibility before biological interpretation"}, {"type": "bullet", "text": "Carry these rules into every method and case study"}], "visual": {"type": "placeholder", "description": "Summary triangle: assay → model → evidence."}, "audio": "assets/audio/week02_lecture01_L1-12.mp3", "transcript": "The main message today is that functional genomics is assay-aware statistical reasoning.\n\nFirst, define the assay object. Are we modeling enriched fragments, accessible fragments, broad domains, footprints, or contact counts?\n\nSecond, model signal against structured background. The genome is not a uniform null distribution, and different assays create different artifacts.\n\nThird, require reproducibility before interpretation. QC, replicate consistency, blacklist filtering, calibration, and orthogonal evidence all determine how strong the claim can be.\n\nAnd finally, interpret regulatory biology as evidence integration. Peaks, motifs, histone marks, accessibility, contacts, and expression are pieces of a model. They are not automatically proof by themselves.\n\nIn Lecture 2, we will apply this framework to specific method families: MACS, SICER, HMMRATAC, footprinting, CUT peak callers, contact callers, and verification strategies.", "sources": ["S001-S015"]}], "deliveryTarget": {"targetLectureMinutes": 30, "targetSlideCount": 20, "targetSecondsPerSlide": 90, "currentAudioSeconds": 639.816, "currentAudioMinutesApprox": "10:40", "note": "Current 12-slide export is a concise pilot; expand to about 20 slides and lengthen narration toward ~1.5 minutes per slide for a 30-minute lecture."}, "interSlidePauseMs": 1000};</script>
