  <script>window.LECTURE_DECK = {"module": "Week 02 — Functional Genomics in Cancer", "lecture": "Lecture 1 Pilot — Background & Problem Definition", "sourceSlideText": "04-slides/week-02-functional-genomics/slide-text.md", "sourceScript": "05-scripts/week-02-functional-genomics/lecture-01-script.md", "audioManifest": "06-audio/week-02-functional-genomics/audio-manifest.md", "slides": [{"id": "L1-01", "title": "Functional Genomics in Cancer", "steps": [{"type": "bullet", "text": "Week 02: bulk regulatory assays as computational measurement systems"}, {"type": "bullet", "text": "From biased molecular readouts to defensible regulatory claims"}, {"type": "bullet", "text": "Core question: what can we infer from peaks, fragments, domains, and contacts?"}], "visual": {"type": "placeholder", "description": "Title slide with simple icons for sequencing reads, chromatin, enhancer, and contact map."}, "audio": "assets/audio/week02_lecture01_L1-01.mp3", "transcript": "Today we start the functional genomics module. The theme is simple but important: these assays do not directly tell us ‘this is an enhancer,’ ‘this transcription factor is active,’ or ‘this loop is causal.’ They give us molecular readouts — reads, fragments, domains, or contact counts — and we have to turn those readouts into regulatory claims.\n\nSo this is not mainly a tour of software names. We will talk about tools, but the deeper goal is to understand what problem each tool is trying to solve. A peak caller, a domain caller, a footprinting method, and a loop caller all encode assumptions about the assay and about the background signal.\n\nBy the end of the week, I want you to be able to look at a regulatory genomics result in a cancer paper and ask: what exactly was measured, what model converted that measurement into a call, and how strong is the evidence for the biological interpretation?", "sources": ["Module synthesis"]}, {"id": "L1-02", "title": "Why mutations are not enough", "steps": [{"type": "bullet", "text": "Many cancer mechanisms are regulatory, not coding-only"}, {"type": "bullet", "text": "Lineage state, enhancer activation, TF rewiring, and 3D regulatory context can shape tumor behavior"}, {"type": "bullet", "text": "Functional genomics helps explain when and where the genome is active"}], "visual": {"type": "placeholder", "description": "Regulatory mechanism map: mutation list → regulatory state → phenotype."}, "audio": "assets/audio/week02_lecture01_L1-02.mp3", "transcript": "Cancer genomics often starts with mutations: point mutations, copy number changes, structural variants. Those are essential, but they do not explain everything. Two tumors can have similar coding alterations and very different cell states. A tumor can change lineage program, immune visibility, enhancer activity, or transcription factor dependence without a simple new coding mutation.\n\nThat is where functional genomics enters. These assays ask when and where the genome is active. Which promoters are open? Which enhancers are active? Which transcription factors are bound? Which regulatory regions physically contact candidate target genes?\n\nIn cancer, this matters for several recurring mechanisms. In pan-cancer ATAC-seq, accessibility maps reveal regulatory programs and subtype structure. In prostate cancer, the androgen receptor can be redistributed across a new cistrome during tumorigenesis. In neuroblastoma, super-enhancer landscapes help define regulatory cell states. In enhancer hijacking, the coding sequence of an oncogene may be unchanged, but a structural rearrangement moves it into a new regulatory neighborhood.\n\nSo the mutation list is not the whole mechanism. Functional genomics gives us evidence about regulatory state.", "sources": ["S011", "S012", "S016-S019"]}, {"id": "L1-03", "title": "Three questions before software", "ordered": true, "steps": [{"type": "bullet", "text": "What is the observed statistical object?"}, {"type": "bullet", "text": "What is signal versus background?"}, {"type": "bullet", "text": "How do we know the call is reproducible and biologically interpretable?"}], "visual": {"type": "placeholder", "description": "Three-question triangle: assay → model → evidence."}, "audio": "assets/audio/week02_lecture01_L1-03.mp3", "transcript": "Before choosing a tool, I want you to ask three questions.\n\nFirst: what is the observed statistical object? Is it a pileup of ChIP-seq reads? Paired-end ATAC fragments? A sparse contact matrix? These are not interchangeable.\n\nSecond: what is signal versus background? A peak only means something relative to an expected background. That background may depend on mappability, GC content, chromatin accessibility, local copy number, enzyme bias, or genomic distance.\n\nThird: how do we know the call is reproducible and biologically interpretable? A tall pileup in one sample is not enough. We need quality control, replicate consistency, calibration, and ideally some orthogonal evidence.\n\nIf you keep these three questions in mind, the rest of the week becomes much easier. Different tools are different answers to these questions.", "sources": ["S001", "S007", "S013-S015"]}]};</script>
